<div class="card">
    <label>DESIRED URL</label>
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <span style="color: var(--secondary); margin-right: 10px;">bog-g-host.vercel.app/</span>
        <input type="text" id="siteName" placeholder="my-site" style="margin-bottom: 0;">
    </div>

    <label>HTML / CSS / JS CODE</label>
    <textarea id="htmlCode" rows="10" placeholder="<h1>My New Site</h1>"></textarea>

    <label>ASSETS (OPTIONAL)</label>
    <input type="file" id="assets" multiple style="border: 1px dashed var(--border); padding: 10px; margin-bottom: 20px;">

    <button class="button" onclick="publishToVercel()">
        <svg viewBox="0 0 16 16" class="bi bi-lightning-charge-fill" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"></path>
        </svg>
        Publish Project
    </button>
</div>

<div id="status-box" style="display:none; margin-top: 20px; border: 1px solid #333; padding: 20px; border-radius: 8px;">
    <p>🚀 Production Deployment Success!</p>
    <a id="visitLink" href="#" style="color: #0070f3; text-decoration: none; font-weight: bold;">Visit Site →</a>
</div>

<script>
    function publishToVercel() {
        const slug = document.getElementById('siteName').value.toLowerCase().replace(/ /g, '-');
        const code = document.getElementById('htmlCode').value;
        
        if(!slug || !code) return alert("Fill in the blanks!");

        // 1. Save to LocalStorage (For immediate preview)
        localStorage.setItem(slug, code);

        // 2. Update UI
        const link = document.getElementById('visitLink');
        const fullPath = window.location.origin + "/" + slug;
        
        link.href = fullPath;
        link.innerText = "Visit: " + fullPath;
        document.getElementById('status-box').style.display = "block";

        console.log("Published " + slug + " to the edge.");
    }
</script>
