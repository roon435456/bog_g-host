<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bog Nuke Preview</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #0a1205; font-family: sans-serif;
        }

        /* Video Layer */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }

        /* Hidden API Button Container */
        #api-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none; z-index: 10;
        }

        /* Bog Green UI Styling */
        .flex { display: flex; align-items: center; gap: 5px; }
        .outer-cont {
            padding: 12px 20px; border: none; font-size: 1rem; cursor: pointer;
            position: relative; border-radius: 12px; color: #d4e0c0;
            transition: all 0.3s ease;
            /* Bog Gradient & Text Shadow */
            background: linear-gradient(90deg, #2d4c1e, #4a6333, #1b300a);
            box-shadow: inset 0px 0px 8px #7a9460a9, inset 0px 35px 30px #050a02, 
                        0px 10px 20px #000, 0px 0px 15px #3e5c26; /* Vine-like glow */
            text-shadow: 2px 2px 2px #000;
        }

        /* Vine/Leaf Effect Pseudo-element */
        .outer-cont::after {
            content: "🌿"; position: absolute; top: -10px; right: -5px; font-size: 1.2rem; opacity: 0.7;
        }

        /* Modal for Code */
        #code-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            color: #55efc4; padding: 20px; z-index: 20; overflow: auto;
        }
        pre { background: #111; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
        .copy-btn { background: #4a6333; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="bog-nuke.mp4" type="video/source">
        </video>

    <div id="api-container">
        <div class="outer-cont flex" id="api-btn">
            <svg viewBox="0 0 24 24" height="24" width="24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.107 5.448c.598-1.75 3.016-1.803 3.725-.159l.807 2.36a4 4 0 0 0 2.276 2.411l2.36.806c1.75.598 1.803 3.016.16 3.725l-2.36.807a4 4 0 0 0-2.412 2.276l-.806 2.361c-.598 1.75-3.016 1.803-3.724.16l-.806-2.36a4 4 0 0 0-2.276-2.412l-2.36-.806c-1.751-.598-1.804-3.016-.16-3.724l2.36-.806A4 4 0 0 0 8.22 8.025l.081-.216z" fill="currentColor"></path>
            </svg>
            API Access
        </div>
    </div>

    <div id="code-modal">
        <button class="copy-btn" onclick="copyCode()">Copy HTML Code</button>
        <button class="copy-btn" onclick="document.getElementById('code-modal').style.display='none'">Close</button>
        <pre id="embed-code"></pre>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const apiCont = document.getElementById('api-container');
        const modal = document.getElementById('code-modal');
        const codeDisplay = document.getElementById('embed-code');

        // Toggle UI with numbers
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') {
                apiCont.style.display = 'block';
            }
            
            // Video Controls with ';'
            if (e.key === ';') {
                if (video.paused) video.play(); else video.pause();
            }
            if (e.key === 'ArrowRight' && apiCont.style.display === 'block') video.currentTime += 5;
            if (e.key === 'ArrowLeft' && apiCont.style.display === 'block') video.currentTime -= 5;
        });

        const embedHTML = `<iframe src="https://boggg.amango.org/" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;"></iframe>`;

        document.getElementById('api-btn').onclick = () => {
            codeDisplay.innerText = embedHTML;
            modal.style.display = 'block';
        };

        function copyCode() {
            navigator.clipboard.writeText(embedHTML);
            alert("Code copied!");
        }
    </script>
</body>
</html>
