<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bog-G-Host Studio</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-bg: #050505;
            --panel-bg: #0d0d0d;
            --border: #1a1a1a;
            --text-dim: #666;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- LANDING UI --- */
        #landing-page {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        .input-group { margin-bottom: 40px; }
        .input-group input {
            background: transparent; border: none;
            border-bottom: 2px solid var(--matrix-green);
            color: var(--matrix-green); font-size: 2rem;
            text-align: center; outline: none; padding: 10px;
        }

        /* Uiverse Button Style */
        .button {
            --white: #ffe7ff; --bg: #080808; --radius: 100px;
            outline: none; cursor: pointer; border: 0; position: relative;
            border-radius: var(--radius); background-color: var(--bg);
            transition: all 0.2s ease;
            box-shadow: inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.3), inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.7), inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.5), 0 3rem 3rem rgba(0, 0, 0, 0.3), 0 1rem 1rem -0.6rem rgba(0, 0, 0, 0.8);
        }
        .button .wrap { font-size: 25px; font-weight: 500; color: rgba(255, 255, 255, 0.7); padding: 32px 45px; border-radius: inherit; position: relative; overflow: hidden; }
        .button .wrap p span:nth-child(2) { display: none; }
        .button:hover .wrap p span:nth-child(1) { display: none; }
        .button:hover .wrap p span:nth-child(2) { display: inline-block; }
        .button .wrap p { display: flex; align-items: center; gap: 12px; margin: 0; transition: all 0.2s ease; transform: translateY(2%); mask-image: linear-gradient(to bottom, white 40%, transparent); }
        .button .wrap::before, .button .wrap::after { content: ""; position: absolute; transition: all 0.3s ease; }
        .button .wrap::before { left: -15%; right: -15%; bottom: 25%; top: -100%; border-radius: 50%; background-color: rgba(255, 255, 255, 0.12); }
        .button .wrap::after { left: 6%; right: 6%; top: 12%; bottom: 40%; border-radius: 22px 22px 0 0; box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.8); background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0) 100%); }
        .button:hover { box-shadow: inset 0 0.3rem 0.5rem rgba(255, 255, 255, 0.4), inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.7), inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.7), 0 3rem 3rem rgba(0, 0, 0, 0.3), 0 1rem 1rem -0.6rem rgba(0, 0, 0, 0.8); }
        .button:hover .wrap::before { transform: translateY(-5%); }
        .button:active { transform: translateY(4px); }

        /* --- STUDIO UI --- */
        #studio-page { display: none; height: 100vh; grid-template-columns: 250px 1fr; grid-template-rows: 50px 1fr; }
        
        header { 
            grid-column: span 2; background: var(--panel-bg); 
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; padding: 0 20px; justify-content: space-between;
        }

        .sidebar { 
            background: var(--panel-bg); border-right: 1px solid var(--border);
            padding: 20px 10px;
        }

        .file-item {
            padding: 8px 15px; border-radius: 4px; color: var(--text-dim);
            cursor: pointer; font-size: 0.9rem; margin-bottom: 2px;
        }
        .file-item.active { background: #1a1a1a; color: var(--matrix-green); }

        .editor-container { background: var(--dark-bg); position: relative; }
        
        textarea {
            width: 100%; height: 100%; background: transparent;
            border: none; color: var(--matrix-green); font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem; padding: 20px; outline: none; resize: none; box-sizing: border-box;
        }

        .publish-small {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--matrix-green); color: black;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            cursor: pointer; border: none;
        }

        .visit-btn {
            background: transparent; border: 1px solid var(--matrix-green);
            color: var(--matrix-green); padding: 5px 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="input-group">
            <input type="text" id="project-slug" placeholder="Project Name..." autocomplete="off">
        </div>
        
        <button class="button" onclick="initStudio()">
            <div class="wrap">
              <p>
                <span>Create New</span>
                <span>Launch Studio</span>
              </p>
            </div>
        </button>
    </div>

    <div id="studio-page">
        <header>
            <div id="studio-title" style="color: var(--matrix-green); font-weight: bold;">STUDIO // </div>
            <button class="visit-btn" id="open-live">Visit Live Site</button>
        </header>

        <div class="sidebar">
            <div style="font-size: 0.7rem; color: #444; margin-bottom: 10px; padding-left: 15px;">FILES</div>
            <div class="file-item active">index.html</div>
            <div class="file-item">style.css</div>
            <div class="file-item">script.js</div>
            <div class="file-item" style="margin-top: 20px; opacity: 0.5;">+ Upload Image</div>
        </div>

        <div class="editor-container">
            <textarea id="code-editor" spellcheck="false"></textarea>
            <button class="publish-small" onclick="saveProject()">PUBLISH CHANGES</button>
        </div>
    </div>

    <script>
        let currentSlug = "";

        // Start the studio
        function initStudio() {
            const nameInput = document.getElementById('project-slug').value;
            if(!nameInput) return alert("Enter a project name first!");

            currentSlug = nameInput.toLowerCase().replace(/ /g, '-');
            
            // Set default code
            document.getElementById('code-editor').value = `<!DOCTYPE html>
<html>
<head>
    <title>${nameInput}</title>
    <style>
        body { background: #000; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>${nameInput.toUpperCase()} IS LIVE</h1>
</body>
</html>`;

            // Switch UI
            document.getElementById('landing-page').style.display = "none";
            document.getElementById('studio-page').style.display = "grid";
            document.getElementById('studio-title').innerText = "STUDIO // " + currentSlug;
        }

        // Save to "Database" (LocalStorage)
        function saveProject() {
            const code = document.getElementById('code-editor').value;
            localStorage.setItem('host_' + currentSlug, code);
            alert("Changes published to production!");
        }

        // Visit Button
        document.getElementById('open-live').onclick = () => {
            const code = document.getElementById('code-editor').value;
            // Using Data URI to avoid blob: prefix and show real-time changes
            const win = window.open();
            win.document.write(code);
            win.document.close();
        };

        // --- THE ROUTER ---
        // This runs if someone visits bog-g-host.vercel.app/yourname
        window.onload = () => {
            const path = window.location.pathname.substring(1);
            const savedData = localStorage.getItem('host_' + path);
            
            if(path && savedData) {
                // If a site exists, inject it and stop everything else
                document.open();
                document.write(savedData);
                document.close();
            }
        }
    </script>
</body>
</html>
