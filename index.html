<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bog Studio | Vercel + GitHub Hoster</title>
    <style>
        :root {
            --bog-dark: #1a241a;
            --bog-moss: #2d3d2d;
            --bog-green: #4f6b4f;
            --bog-leaf: #78a85d;
            --vine-accent: #3a5335;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bog-dark);
            color: #e0eadd;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LANDING PAGE --- */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #2d3d2d 0%, #1a241a 100%);
            text-align: center;
        }

        .vine-decoration {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, transparent, transparent);
            border-top: 8px solid var(--vine-accent);
            border-radius: 0 0 50% 50%;
        }

        /* Uiverse UI Modified for Bog Green */
        .flex { display: flex; align-items: center; gap: 8px; }
        
        .outer-cont {
            padding: 15px 30px;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            background: linear-gradient(90deg, #2d4d2d, #4f6b4f, #1a2e1a);
            border-radius: 12px;
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: inset 0px 0px 5px #ffffff44, inset 0px 35px 30px #000000aa, 0px 5px 15px #000;
            text-shadow: 1px 1px 2px #000;
            z-index: 10;
        }

        .outer-cont::before {
            content: "🌿";
            position: absolute;
            left: -10px;
            top: -10px;
            font-size: 20px;
            filter: blur(0);
            z-index: -1;
            transition: all 0.3s ease;
        }

        .outer-cont:hover { transform: scale(1.05); }

        /* --- STUDIO INTERFACE --- */
        #studio-workspace {
            display: none; /* Hidden by default */
            grid-template-columns: 250px 1fr;
            height: 100vh;
            border: 10px solid var(--vine-accent);
            box-sizing: border-box;
            position: relative;
        }

        #studio-workspace::after {
            content: "🍃";
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 30px;
            opacity: 0.6;
        }

        .sidebar {
            background: var(--bog-moss);
            border-right: 2px solid var(--bog-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .file-item:hover { background: var(--bog-leaf); color: white; }

        .editor-area {
            background: #111;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            color: #78a85d;
            border: none;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            resize: none;
        }

        /* Modals */
        #create-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bog-moss);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid var(--bog-leaf);
            z-index: 100;
            text-align: center;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 15px;
            width: 80%;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 90;
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="vine-decoration"></div>
        <h1>Bog Studio</h1>
        <p>Deploy your swamp to Vercel & GitHub</p>
        <br>
        <button class="outer-cont flex" onclick="openModal()">
            <svg viewBox="0 0 24 24" height="24" width="24" xmlns="http://www.w3.org/2000/svg">
                <g fill="none">
                  <path d="M9.107 5.448c.598-1.75 3.016-1.803 3.725-.159l.06.16l.807 2.36a4 4 0 0 0 2.276 2.411l.217.081l2.36.806c1.75.598 1.803 3.016.16 3.725l-.16.06l-2.36.807a4 4 0 0 0-2.412 2.276l-.081.216l-.806 2.361c-.598 1.75-3.016 1.803-3.724.16l-.062-.16l-.806-2.36a4 4 0 0 0-2.276-2.412l-.216-.081l-2.36-.806c-1.751-.598-1.804-3.016-.16-3.724l.16-.062l2.36-.806A4 4 0 0 0 8.22 8.025l.081-.216z" fill="currentColor"></path>
                </g>
            </svg>
            Create New Site
        </button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="create-modal">
        <h3>Name your Swamp</h3>
        <input type="text" id="site-name" placeholder="lowercaseonly" oninput="validateInput(this)">
        <br>
        <button class="outer-cont" onclick="launchStudio()">Initialize Site</button>
    </div>

    <div id="studio-workspace">
        <div class="sidebar">
            <h3 id="display-site-name">project-name</h3>
            <hr style="width:100%; border: 1px solid var(--bog-dark)">
            <div class="file-item" onclick="loadFile('index.html')">📄 index.html</div>
            <div class="file-item">📁 Upload File (MP3/MP4/PNG)</div>
            <div style="margin-top: auto; font-size: 12px; color: var(--bog-leaf);">Connected to Vercel</div>
        </div>
        <div class="editor-area">
            <div id="file-title" style="margin-bottom: 10px; color: var(--bog-leaf);">Editing: index.html</div>
            <textarea id="editor"><!DOCTYPE html>
<html>
<head>
    <title>My Bog Site</title>
</head>
<body>
    <h1>Welcome to the Swamp</h1>
</body>
</html></textarea>
        </div>
    </div>

    <script>
        const landing = document.getElementById('landing-page');
        const studio = document.getElementById('studio-workspace');
        const modal = document.getElementById('create-modal');
        const overlay = document.getElementById('overlay');
        const siteInput = document.getElementById('site-name');

        function openModal() {
            modal.style.display = 'block';
            overlay.style.display = 'block';
        }

        // Restriction: no spaces, capitals, unicodes, special characters
        function validateInput(input) {
            input.value = input.value.replace(/[^a-z]/g, '');
        }

        function launchStudio() {
            if(siteInput.value.length < 1) return alert("Please name your site!");
            
            document.getElementById('display-site-name').innerText = siteInput.value + ".bog";
            
            // Transition
            modal.style.display = 'none';
            overlay.style.display = 'none';
            landing.style.display = 'none';
            studio.style.display = 'grid';
        }

        function loadFile(name) {
            document.getElementById('file-title').innerText = "Editing: " + name;
        }
    </script>
</body>
</html>
