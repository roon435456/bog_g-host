<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bog Studio</title>
    <style>
        :root {
            --bog-dark: #121a12;
            --bog-moss: #223022;
            --bog-leaf: #5e8c47;
            --vine: #2a3d25;
        }
        body { margin: 0; background: var(--bog-dark); color: #d1ddd1; font-family: sans-serif; overflow: hidden; }
        
        /* Bog-themed Uiverse UI */
        .outer-cont {
            padding: 12px 20px; border: none; font-size: 1rem; cursor: pointer; position: relative;
            background: linear-gradient(90deg, #2d4d2d, #5e8c47, #1a2e1a);
            border-radius: 12px; color: #fff; transition: all 0.3s ease;
            box-shadow: inset 0px 0px 5px #ffffff44, inset 0px 35px 30px #000, 0px 5px 10px #000000cc;
        }
        .outer-cont::before {
            content: "🌿"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }
        .outer-cont:hover::before { opacity: 1; filter: blur(10px); }

        #landing { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #studio { display: none; grid-template-columns: 250px 1fr; height: 100vh; border: 5px solid var(--vine); }
        
        .sidebar { background: var(--bog-moss); padding: 20px; border-right: 2px solid var(--vine); }
        .file-item { padding: 8px; margin: 5px 0; background: rgba(0,0,0,0.3); border-radius: 4px; cursor: pointer; }
        
        .main { display: flex; flex-direction: column; background: #080a08; }
        .toolbar { padding: 10px; background: var(--bog-moss); display: flex; justify-content: space-between; }
        textarea { flex: 1; background: transparent; color: var(--bog-leaf); border: none; padding: 20px; font-family: monospace; outline: none; }
        #preview { display: none; flex: 1; justify-content: center; align-items: center; }
        img, video { max-width: 80%; border: 2px solid var(--bog-leaf); }
    </style>
</head>
<body>

<div id="landing">
    <h1 style="color: var(--bog-leaf)">Bog Studio</h1>
    <input type="text" id="siteName" placeholder="sitename" style="padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
    <button class="outer-cont" onclick="initStudio()">Create Studio</button>
</div>

<div id="studio">
    <div class="sidebar">
        <h3>Files 🍃</h3>
        <div id="fileList">
            <div class="file-item" onclick="showFile('index.html')">index.html</div>
        </div>
        <input type="file" id="uploader" hidden onchange="uploadFile()">
        <button class="outer-cont" style="width:100%; margin-top:20px;" onclick="document.getElementById('uploader').click()">Upload</button>
    </div>
    <div class="main">
        <div class="toolbar">
            <span id="curFile">index.html</span>
            <button class="outer-cont" onclick="publish()">Publish</button>
        </div>
        <textarea id="editor"></textarea>
        <div id="preview"></div>
    </div>
</div>

<script>
    let currentSite = "";
    let files = {"index.html": "<h1>My Bog Site</h1>"};

    function initStudio() {
        currentSite = document.getElementById('siteName').value.toLowerCase().replace(/[^a-z]/g, '');
        if(!currentSite) return;
        document.getElementById('landing').style.display = 'none';
        document.getElementById('studio').style.display = 'grid';
        document.getElementById('editor').value = files["index.html"];
    }

    async function uploadFile() {
        const file = document.getElementById('uploader').files[0];
        const formData = new FormData();
        formData.append("file", file);
        // FastAPI call
        await fetch(`/upload/${currentSite}`, {method: "POST", body: formData});
        
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerText = file.name;
        item.onclick = () => showFile(file.name, true, file.type);
        document.getElementById('fileList').appendChild(item);
    }

    function showFile(name, isMedia = false, type = "") {
        document.getElementById('curFile').innerText = name;
        if(isMedia && !type.includes('html')) {
            document.getElementById('editor').style.display = 'none';
            document.getElementById('preview').style.display = 'flex';
            const url = `https://bog-g-host.vercel.app/${currentSite}/${name}`;
            document.getElementById('preview').innerHTML = type.includes('video') ? `<video src="${url}" controls>` : `<img src="${url}">`;
        } else {
            document.getElementById('editor').style.display = 'block';
            document.getElementById('preview').style.display = 'none';
        }
    }

    async function publish() {
        const code = document.getElementById('editor').value;
        await fetch(`/publish/${currentSite}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({html: code})
        });
        window.open(`https://bog-g-host.vercel.app/${currentSite}`, '_blank');
    }
</script>
</body>
</html>
